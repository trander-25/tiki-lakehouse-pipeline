version: 2

models:
  - name: int_tiki__latest_products
    description: Deduplicated latest record per product from stg_tiki__products.
    columns:
      - name: product_id
        description: Unique identifier of the product.
        data_tests:
          - not_null
          - unique
      - name: product_sku
        description: SKU of the product.
      - name: product_name
        description: Name of the product.
      - name: current_price
        description: Current selling price.
      - name: discount
        description: Discount amount.
      - name: discount_rate
        description: Discount rate percentage.
      - name: original_price
        description: Original price.
      - name: rating_average
        description: Average customer rating.
      - name: review_count
        description: Number of reviews.
      - name: url_path
        description: Relative URL path of the product.
      - name: thumbnail_url
        description: URL to the product thumbnail image.
      - name: seller_id
        description: Identifier of the seller.
      - name: quantity_sold_count
        description: Quantity sold count.
      - name: category_l1
        description: Level 1 category.
      - name: category_l2
        description: Level 2 category.
      - name: category_l3
        description: Level 3 category.
      - name: primary_category_name
        description: Primary category name.
      - name: seller_type
        description: Type of the seller.
      - name: extracted_at
        description: Timestamp when the product details were crawled.
        data_tests:
          - not_null
